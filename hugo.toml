baseURL = "https://winhun98.github.io/blog/"
languageCode = "ko"
defaultContentLanguage = "ko"
title = "Medical AI Research Notes"
theme = "PaperMod"
hasCJKLanguage = true

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[pagination]
  pagerSize = 10

[params]
  env = "production"
  showReadingTime = true
  showShareButtons = false
  showPostNavLinks = true
  showBreadCrumbs = true
  showCodeCopyButtons = true
  defaultTheme = "auto"
  description = "Clinical ML, Offline RL, and Neuroscience Research"
  ShowFullTextinRSS = true

  [params.label]
    text = "MARN"

  [params.homeInfoParams]
    Title = "Medical AI Research Notes"
    Content = """Clinical ML / Offline RL / Neuroscience
Exploring the intersection of machine learning and medicine."""

[[menu.main]]
  name = "Series"
  url = "/series/"
  weight = 5

[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 10

[[menu.main]]
  name = "Search"
  url = "/search/"
  weight = 15

[[menu.main]]
  name = "GitHub"
  url = "https://github.com/winhun98"
  weight = 20

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['$$', '$$']]
          inline = [['$', '$']]
  [markup.highlight]
    style = "monokai"
    lineNos = false
    noClasses = false

[outputs]
  home = ["HTML", "RSS", "JSON"]
